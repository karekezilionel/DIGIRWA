<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - DIGIRWA</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .admin-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
      }
      .admin-table th, .admin-table td {
        padding: 1rem;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }
      .admin-table th {
        background-color: var(--surface);
        font-weight: 600;
        color: var(--text-muted);
      }
      .admin-table tr:hover {
        background-color: rgba(0, 0, 0, 0.02);
      }
      [data-theme="dark"] .admin-table tr:hover {
        background-color: rgba(255, 255, 255, 0.02);
      }
      .action-buttons {
        display: flex;
        gap: 0.5rem;
      }
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }
      .modal.active {
        display: flex;
      }
      .modal-content {
        background: var(--bg);
        padding: 2rem;
        border-radius: 12px;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h1>Admin Dashboard</h1>
      </div>

      <div class="card" style="margin-bottom: 2rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
          <h2 class="section-title" style="margin: 0;">Users Management</h2>
          <button class="btn btn-primary" id="add-user-btn"><i data-lucide="plus" style="width: 16px; height: 16px; vertical-align: middle; margin-right: 4px;"></i> Add User</button>
        </div>
        <div style="overflow-x: auto;">
          <table class="admin-table" id="users-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="users-tbody">
             
            </tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
          <h2 class="section-title" style="margin: 0;">Courses Management</h2>
          <button class="btn btn-primary" id="add-course-btn"><i data-lucide="plus" style="width: 16px; height: 16px; vertical-align: middle; margin-right: 4px;"></i> Add Course</button>
        </div>
        <div style="overflow-x: auto;">
          <table class="admin-table" id="courses-table">
            <thead>
              <tr>
                <th>Course Title</th>
                <th>Description</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="courses-tbody">
            
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="modal" id="user-modal">
      <div class="modal-content">
        <h2 style="margin-bottom: 1.5rem;" id="user-modal-title">Edit User</h2>
        <form id="user-form">
          <input type="hidden" id="user-id" />
          <div class="form-group">
            <label for="user-name">Name</label>
            <input type="text" id="user-name" class="form-control" required />
          </div>
          <div class="form-group">
            <label for="user-email">Email</label>
            <input type="email" id="user-email" class="form-control" required />
          </div>
          <div class="form-group">
            <label for="user-role">Role</label>
            <select id="user-role" class="form-control" required>
              <option value="student">Student</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
            <button type="button" class="btn btn-outline" id="cancel-user-btn">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>

    <div class="modal" id="course-modal">
      <div class="modal-content">
        <h2 style="margin-bottom: 1.5rem;" id="course-modal-title">Add Course</h2>
        <form id="course-form">
          <input type="hidden" id="course-id" />
          <div class="form-group">
            <label for="course-title">Course Title</label>
            <input type="text" id="course-title" class="form-control" required />
          </div>
          <div class="form-group">
            <label for="course-desc">Description</label>
            <textarea id="course-desc" class="form-control" rows="3" required></textarea>
          </div>
          <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
            <button type="button" class="btn btn-outline" id="cancel-course-btn">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="/js/i18n.js"></script>
    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/progress.js"></script>
    <script type="module" src="/js/data.js"></script>
    <script type="module" src="/js/admin.js"></script>
  </body>
</html>

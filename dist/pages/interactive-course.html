<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Course - DIGIRWA</title>
    <style>
      .interactive-container {
        display: flex;
        flex-direction: column;
        height: 80vh;
        min-height: 600px;
        gap: 1rem;
      }
      
      .course-header-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 1.5rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      }
      
      .course-title-area {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      
      .lesson-nav {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .panes-wrapper {
        display: flex;
        flex: 1;
        gap: 1rem;
        min-height: 0;
      }

      .pane {
        flex: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      }

      .pane-header {
        padding: 0.75rem 1rem;
        background: var(--bg-color);
        border-bottom: 1px solid var(--border);
        font-weight: 600;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.9rem;
        color: var(--text-muted);
      }

      .pane-content {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
      }

     
      .instructions-pane {
        flex: 0.8;
        min-width: 250px;
        resize: horizontal;
      }
      
      .instructions-content h3 {
        margin-bottom: 1rem;
        color: var(--text-main);
        font-size: 1.4rem;
      }
      
      .instructions-content p, .instructions-content ul {
        margin-bottom: 1rem;
        line-height: 1.6;
        color: var(--text-muted);
      }
      
      .instructions-content ul {
        padding-left: 1.5rem;
      }
      
      .instructions-content li {
        margin-bottom: 0.5rem;
      }
      
      .instructions-content code {
        background: var(--bg-color);
        padding: 0.2rem 0.4rem;
        border-radius: 4px;
        font-family: 'JetBrains Mono', monospace;
        color: var(--primary);
        border: 1px solid var(--border);
      }

      
      .editor-pane {
        flex: 1.2;
        background: #1e1e1e; 
        border-color: #333;
        min-width: 250px;
        resize: horizontal;
      }
      
      .editor-pane .pane-header {
        background: #2d2d2d;
        border-bottom: 1px solid #444;
        color: #ccc;
      }
      
      .editor-textarea {
        width: 100%;
        height: 100%;
        border: none;
        resize: none;
        background: #1e1e1e;
        color: #d4d4d4;
        font-family: 'JetBrains Mono', 'Courier New', Courier, monospace;
        font-size: 15px;
        line-height: 1.5;
        padding: 1rem;
        outline: none;
      }
      
      .editor-textarea:focus {
        box-shadow: inset 0 0 0 1px #007acc;
      }

      /* Preview Pane */
      .preview-pane {
        flex: 1;
        background: #fff;
      }
      
      .preview-pane .pane-header {
        background: #f3f4f6;
        border-bottom: 1px solid #e5e7eb;
        color: #4b5563;
      }
      
      .preview-iframe {
        width: 100%;
        height: 100%;
        border: none;
        background: #fff;
      }

      .feedback-area {
        margin-top: 1rem;
        padding: 1rem;
        border-radius: var(--radius);
        display: none;
      }
      
      .feedback-success {
        background: rgba(16, 185, 129, 0.1);
        color: var(--success);
        border: 1px solid var(--success);
      }
      
      .feedback-error {
        background: rgba(239, 68, 68, 0.1);
        color: var(--danger);
        border: 1px solid var(--danger);
      }

      @media (max-width: 1024px) {
        .panes-wrapper {
          flex-direction: column;
          height: auto;
        }
        .pane {
          min-height: 300px;
        }
        .interactive-container {
          height: auto;
        }
      }
    </style>
    <script type="module" crossorigin src="../assets/main-Bj8hB6fU.js"></script>
    <script type="module" crossorigin src="../assets/progress-l0sNRNKZ.js"></script>
    <script type="module" crossorigin src="../assets/data-DK6-LDdd.js"></script>
    <link rel="stylesheet" crossorigin href="../assets/main-BFZFGG2g.css">
  </head>
  <body>
    <div class="container">
      <nav class="breadcrumbs" style="margin-bottom: 1rem; font-size: 0.9rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.5rem;">
        <a href="/pages/mycourses.html" style="color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 0.25rem;">
          <i data-lucide="book-open" style="width: 14px; height: 14px;"></i> My Courses
        </a>
        <i data-lucide="chevron-right" style="width: 14px; height: 14px;"></i>
        <span id="breadcrumb-course-title" style="font-weight: 500;">HTML & CSS for Beginners</span>
      </nav>

      <div class="interactive-container">
        <div class="course-header-bar">
          <div class="course-title-area">
            <h2 id="course-title" style="margin: 0;">HTML & CSS for Beginners</h2>
            <span class="badge" style="background: var(--primary); color: white; padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.8rem; font-weight: 600;">Interactive</span>
          </div>
          <div class="lesson-nav">
            <button class="btn btn-outline" id="btn-prev" onclick="navigateLesson(-1)" style="padding: 0.5rem;"><i data-lucide="chevron-left"></i></button>
            <span id="lesson-counter" style="font-weight: 600; min-width: 60px; text-align: center;">1 / 4</span>
            <button class="btn btn-outline" id="btn-next" onclick="navigateLesson(1)" style="padding: 0.5rem;"><i data-lucide="chevron-right"></i></button>
          </div>
        </div>

        <div class="panes-wrapper">
          
          <div class="pane instructions-pane">
            <div class="pane-header">
              <span id="lesson-title">1.1 HTML Structure</span>
              <i data-lucide="book-open" style="width: 16px; height: 16px; color: var(--text-muted);"></i>
            </div>
            <div class="pane-content">
              <div id="lesson-instructions" class="instructions-content">
                
              </div>
              
              <div id="feedback-message" class="feedback-area">
               
              </div>
              
              <div id="action-buttons" style="margin-top: 2rem; display: flex; gap: 1rem;">
                <button class="btn btn-outline" onclick="showHint()" style="flex: 1;"><i data-lucide="lightbulb" style="width: 16px; height: 16px; margin-right: 0.5rem;"></i> Hint</button>
                <button class="btn btn-outline" onclick="showSolution()" style="flex: 1;"><i data-lucide="eye" style="width: 16px; height: 16px; margin-right: 0.5rem;"></i> Solution</button>
              </div>
            </div>
          </div>

          
          <div class="pane editor-pane">
            <div class="pane-header">
              <span style="display: flex; align-items: center; gap: 0.5rem;"><i data-lucide="code" style="width: 16px; height: 16px;"></i> index.html</span>
              <button class="btn btn-primary" onclick="runCode()" style="padding: 0.25rem 1rem; font-size: 0.85rem; display: flex; align-items: center; gap: 0.25rem; background: #007acc; border: none;">
                <i data-lucide="play" style="width: 14px; height: 14px;"></i> Run Code
              </button>
            </div>
            <textarea id="code-editor" class="editor-textarea" spellcheck="false"></textarea>
          </div>

          
          <div class="pane preview-pane">
            <div class="pane-header">
              <span>Browser Preview</span>
              <i data-lucide="monitor" style="width: 16px; height: 16px; color: var(--text-muted);"></i>
            </div>
            <iframe id="preview-frame" class="preview-iframe"></iframe>
          </div>
        </div>
      </div>
    </div>

    <script>
      let currentCourse = null;
      let currentLessonIndex = 0;

      document.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = parseInt(urlParams.get('id')) || 4;
        if (window.trackActiveCourse) window.trackActiveCourse(courseId);
        
        let courses = JSON.parse(localStorage.getItem("digirwa_courses") || "[]");
        if (courses.length === 0) courses = mockData.courses;
        currentCourse = courses.find(c => c.id === courseId);
        if (!currentCourse || !currentCourse.lessons) return;
        
        
        const userStr = localStorage.getItem("digirwa_user");
        if (userStr) {
          try {
            const user = JSON.parse(userStr);
            if (user.progress && user.progress[currentCourse.id]) {
              currentCourse.progress = user.progress[currentCourse.id];
            }
          } catch (e) {
            console.error("Error loading progress", e);
          }
        }
        
        document.getElementById("course-title").textContent = currentCourse.title;
        document.getElementById("breadcrumb-course-title").textContent = currentCourse.title;
        
        const lessonParam = parseInt(urlParams.get('lesson')) || 0;
        loadLesson(lessonParam);
      });

      function loadLesson(index) {
        if (index < 0 || index >= currentCourse.lessons.length) return;
        
        currentLessonIndex = index;
        const lesson = currentCourse.lessons[index];
        
        
        document.getElementById("lesson-counter").textContent = `${index + 1} / ${currentCourse.lessons.length}`;
        document.getElementById("lesson-title").textContent = lesson.title;
        document.getElementById("lesson-instructions").innerHTML = lesson.instructions;
        
        const editorPane = document.querySelector(".editor-pane");
        const previewPane = document.querySelector(".preview-pane");
        const actionButtons = document.getElementById("action-buttons");
        
        if (lesson.type === 'visual' || lesson.type === 'quiz') {
          editorPane.style.display = 'none';
          previewPane.style.display = 'none';
          if(actionButtons) actionButtons.style.display = 'none';
          
          
          let continueBtn = document.getElementById("btn-continue-visual");
          if (!continueBtn) {
            continueBtn = document.createElement("button");
            continueBtn.id = "btn-continue-visual";
            continueBtn.className = "btn btn-primary";
            continueBtn.style.marginTop = "2rem";
            continueBtn.style.width = "100%";
            continueBtn.style.display = "flex";
            continueBtn.style.justifyContent = "center";
            continueBtn.innerHTML = 'Continue <i data-lucide="arrow-right" style="width: 16px; height: 16px; margin-left: 0.5rem;"></i>';
            continueBtn.onclick = () => navigateLesson(1);
            document.querySelector(".instructions-pane .pane-content").appendChild(continueBtn);
          }
          continueBtn.style.display = lesson.type === 'visual' ? "flex" : "none";
          
          
          let quizBtn = document.getElementById("btn-take-quiz");
          if (lesson.type === 'quiz') {
            if (!quizBtn) {
              quizBtn = document.createElement("a");
              quizBtn.id = "btn-take-quiz";
              quizBtn.className = "btn btn-primary";
              quizBtn.style.marginTop = "2rem";
              quizBtn.style.width = "100%";
              quizBtn.style.display = "flex";
              quizBtn.style.justifyContent = "center";
              quizBtn.innerHTML = 'Take Quiz <i data-lucide="check-circle" style="width: 16px; height: 16px; margin-left: 0.5rem;"></i>';
              document.querySelector(".instructions-pane .pane-content").appendChild(quizBtn);
            }
            quizBtn.href = `/pages/quiz.html?courseId=${currentCourse.id}&quizId=${lesson.quizId}`;
            quizBtn.style.display = "flex";
          } else if (quizBtn) {
            quizBtn.style.display = "none";
          }
          
          
          if (typeof ProgressManager !== 'undefined') {
            ProgressManager.completeLesson(currentCourse.id, lesson.id);
          } else {
            if (currentCourse.progress < ((currentLessonIndex + 1) / currentCourse.lessons.length) * 100) {
              currentCourse.progress = Math.round(((currentLessonIndex + 1) / currentCourse.lessons.length) * 100);
              
              
              const userStr = localStorage.getItem("digirwa_user");
              if (userStr) {
                try {
                  const user = JSON.parse(userStr);
                  if (!user.progress) user.progress = {};
                  user.progress[currentCourse.id] = currentCourse.progress;
                  localStorage.setItem("digirwa_user", JSON.stringify(user));
                } catch (e) {
                  console.error("Error saving progress", e);
                }
              }
            }
          }
        } else {
          editorPane.style.display = 'flex';
          previewPane.style.display = 'flex';
          if(actionButtons) actionButtons.style.display = 'flex';
          
          let continueBtn = document.getElementById("btn-continue-visual");
          if (continueBtn) continueBtn.style.display = "none";
          
          let quizBtn = document.getElementById("btn-take-quiz");
          if (quizBtn) quizBtn.style.display = "none";
          
          document.getElementById("code-editor").value = lesson.starterCode || "";
          document.getElementById("preview-frame").srcdoc = lesson.starterCode || "";
        }
        
        
        const feedback = document.getElementById("feedback-message");
        feedback.style.display = "none";
        feedback.className = "feedback-area";
        
        
        document.getElementById("btn-prev").disabled = index === 0;
        document.getElementById("btn-next").disabled = index === currentCourse.lessons.length - 1;
        
        if (window.lucide) window.lucide.createIcons();
      }

      function navigateLesson(direction) {
        loadLesson(currentLessonIndex + direction);
      }

      window.runCode = function() {
        const code = document.getElementById("code-editor").value;
        const iframe = document.getElementById("preview-frame");
        const lesson = currentCourse.lessons[currentLessonIndex];
        
        
        iframe.srcdoc = code;
        
        
        const feedback = document.getElementById("feedback-message");
        feedback.style.display = "block";
        
        if (lesson.validationRegex && lesson.validationRegex.test(code)) {
          feedback.className = "feedback-area feedback-success";
          feedback.innerHTML = `<div style="display: flex; align-items: center; gap: 0.5rem;"><i data-lucide="check-circle"></i> <strong>${lesson.successMessage}</strong></div>`;
          
          
          if (typeof ProgressManager !== 'undefined') {
            ProgressManager.completeLesson(currentCourse.id, lesson.id);
            window.showNotification("Progress saved!", "success");
          } else {
            if (currentCourse.progress < ((currentLessonIndex + 1) / currentCourse.lessons.length) * 100) {
              currentCourse.progress = Math.round(((currentLessonIndex + 1) / currentCourse.lessons.length) * 100);
              
              
              const userStr = localStorage.getItem("digirwa_user");
              if (userStr) {
                try {
                  const user = JSON.parse(userStr);
                  if (!user.progress) user.progress = {};
                  user.progress[currentCourse.id] = currentCourse.progress;
                  localStorage.setItem("digirwa_user", JSON.stringify(user));
                } catch (e) {
                  console.error("Error saving progress", e);
                }
              }
              
              window.showNotification("Progress saved!", "success");
            }
          }
        } else {
          feedback.className = "feedback-area feedback-error";
          feedback.innerHTML = `<div style="display: flex; align-items: center; gap: 0.5rem;"><i data-lucide="x-circle"></i> <strong>Not quite right.</strong> Check the instructions and try again.</div>`;
        }
        
        if (window.lucide) window.lucide.createIcons();
      };

      window.showHint = function() {
        const lesson = currentCourse.lessons[currentLessonIndex];
        const feedback = document.getElementById("feedback-message");
        feedback.style.display = "block";
        feedback.className = "feedback-area";
        feedback.style.background = "rgba(245, 158, 11, 0.1)";
        feedback.style.color = "var(--warning)";
        feedback.style.border = "1px solid var(--warning)";
        feedback.innerHTML = `<div style="display: flex; align-items: center; gap: 0.5rem;"><i data-lucide="lightbulb"></i> <strong>Hint:</strong> Look closely at the tags required in the instructions. Make sure they are closed properly.</div>`;
        if (window.lucide) window.lucide.createIcons();
      };

      window.showSolution = function() {
        const lesson = currentCourse.lessons[currentLessonIndex];
        document.getElementById("code-editor").value = lesson.solution;
        window.runCode();
      };
    </script>
  </body>
</html>

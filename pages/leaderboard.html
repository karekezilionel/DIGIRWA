<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaderboard - DIGIRWA</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .leaderboard-table {
        width: 100%;
        border-collapse: collapse;
      }
      .leaderboard-table th, .leaderboard-table td {
        padding: 1rem;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }
      .leaderboard-table th {
        color: var(--text-muted);
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 0.05em;
      }
      .leaderboard-table tr:last-child td {
        border-bottom: none;
      }
      .rank-badge {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        background: var(--border);
        color: var(--text-muted);
      }
      .rank-1 { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
      .rank-2 { background: rgba(156, 163, 175, 0.1); color: #9CA3AF; }
      .rank-3 { background: rgba(180, 83, 9, 0.1); color: #B45309; }
      .user-info {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 style="margin-bottom: 2rem" data-i18n="leaderboard">Leaderboard</h1>

      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
          <h2 class="section-title" style="margin: 0;">Top Learners</h2>
          <span class="badge badge-completed">This Week</span>
        </div>
        
        <div style="overflow-x: auto;">
          <table class="leaderboard-table">
            <thead>
              <tr>
                <th>Rank</th>
                <th>Student</th>
                <th>Courses Completed</th>
                <th>Points</th>
              </tr>
            </thead>
            <tbody id="leaderboard-body">
              
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script type="module" src="/js/i18n.js"></script>
    <script type="module" src="/js/main.js"></script>
    <script  src="/js/progress.js"></script>
    <script type="module" src="/js/data.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const renderLeaderboard = () => {
          const tbody = document.getElementById("leaderboard-body");
          if (!tbody) return;
          
          let allProgress = {};
          if (typeof ProgressManager !== 'undefined') {
            allProgress = ProgressManager.getAllProgress();
          }
          
          const usersData = [];
          const registeredUsers = JSON.parse(localStorage.getItem("digirwa_users") || "[]");
          const currentUser = JSON.parse(localStorage.getItem("digirwa_user") || "{}");
          
         
          for (const email in allProgress) {
            const score = ProgressManager.getTotalScore(email);
            let name = email.split('@')[0]; 
            
            if (currentUser.email === email) {
              if (currentUser.name) name = currentUser.name;
            } else {
              const userObj = registeredUsers.find(u => u.email === email);
              if (userObj) {
                if (userObj.name) name = userObj.name;
              }
            }
            
            let completedCourses = 0;
            const userProg = allProgress[email];
            for (const courseId in userProg) {
              if (userProg[courseId].quizScore && userProg[courseId].quizScore >= 50) {
                completedCourses++;
              }
            }
            
            usersData.push({ email, name, score, courses: completedCourses });
          }
          
         
          registeredUsers.forEach(user => {
            if (!usersData.find(u => u.email === user.email)) {
              usersData.push({ email: user.email, name: user.name, score: 0, courses: 0 });
            }
          });
          
          
          usersData.sort((a, b) => b.score - a.score);
          
          if (usersData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">No data available yet.</td></tr>';
            return;
          }

          tbody.innerHTML = usersData.map((l, idx) => {
            const rank = idx + 1;
            const rankClass = rank <= 3 ? `rank-${rank}` : '';
            const nameParts = l.name.trim().split(" ");
            const firstLetter = nameParts[0].charAt(0).toUpperCase();
            const avatarContent = firstLetter;
            return `
              <tr>
                <td>
                  <div class="rank-badge ${rankClass}">
                    ${rank === 1 ? '<i data-lucide="award" style="width: 16px;"></i>' : rank}
                  </div>
                </td>
                <td>
                  <div class="user-info">
                    <div class="user-avatar">${avatarContent}</div>
                    <span style="font-weight: 500;">${l.name}</span>
                  </div>
                </td>
                <td>${l.courses}</td>
                <td style="font-weight: 600; color: var(--primary);">${l.score}</td>
              </tr>
            `;
          }).join("");

          if (window.lucide) window.lucide.createIcons();
        };

        renderLeaderboard();

        window.addEventListener("storage", (e) => {
          if (e.key === "userProgress" || e.key === "digirwa_users" || e.key === "digirwa_user") {
            renderLeaderboard();
          }
        });
      });
    </script>
  </body>
</html>
